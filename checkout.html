<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bidón Fresco 💧 | Pago</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(180deg, #f0fbff 0%, #ecfeff 40%, #f8fdff 100%); color: #0f172a; }
    .btn-bounce { transition: transform .18s ease, box-shadow .18s ease; }
    .btn-bounce:hover { transform: scale(1.03); box-shadow: 0 10px 18px rgba(34,211,238,.3); }
  </style>
</head>
<body>
  <main class="min-h-screen py-10">
    <div class="max-w-4xl mx-auto px-4">
      <a href="index.html#carrito" class="text-sky-600 font-bold">← Volver a la tienda</a>
      <div class="mt-4 rounded-3xl bg-white border border-sky-100 shadow-xl p-6 md:p-8">
        <h1 class="text-3xl font-extrabold text-sky-700 mb-2">Pago 💧</h1>
        <p class="text-sky-600 mb-6">Revisa tu carrito y elige método de pago.</p>

        <div id="checkout-list" class="space-y-3 mb-6"></div>
        <p class="text-xl font-black text-sky-700 mb-6">Total: <span id="checkout-total">$0</span></p>

        <label for="payment-method" class="block text-sm font-bold text-sky-700 mb-2">Método de pago</label>
        <select id="payment-method" class="w-full md:w-72 px-3 py-2 rounded-xl border border-sky-200 mb-6 focus:outline-none focus:ring-2 focus:ring-cyan-300">
          <option value="cash">Efectivo</option>
          <option value="transfer">Transferencia</option>
          <option value="card">Tarjeta</option>
        </select>

        <div id="transfer-ref-box" class="hidden mb-6">
          <label for="transfer-ref" class="block text-sm font-bold text-sky-700 mb-2">ID de referencia de transferencia</label>
          <input id="transfer-ref" type="text" placeholder="Ej: TRX-2026-000123" class="w-full md:w-72 px-3 py-2 rounded-xl border border-sky-200 focus:outline-none focus:ring-2 focus:ring-cyan-300" />
        </div>

        <div class="flex flex-wrap gap-3">
          <button id="confirm-pay" class="btn-bounce px-6 py-3 rounded-xl bg-cyan-400 text-sky-900 font-black">Confirmar pago</button>
          <button id="clear-cart" class="btn-bounce px-6 py-3 rounded-xl bg-rose-100 text-rose-700 font-black">Vaciar carrito</button>
        </div>
        <p id="pay-msg" class="mt-4 font-semibold"></p>
      </div>
    </div>
  </main>

  <script>
    const CART_KEY = "bidonFrescoCart";
    const SALES_KEY = "bidonFrescoSales";
    const PRODUCTS_KEY = "bidonFrescoProducts";
    const LANG_KEY = "bidonFrescoLang";
    const currentLang = localStorage.getItem(LANG_KEY) || "es";

    function getCart() { return JSON.parse(localStorage.getItem(CART_KEY) || "[]"); }
    function saveCart(cart) { localStorage.setItem(CART_KEY, JSON.stringify(cart)); }
    function getSales() { return JSON.parse(localStorage.getItem(SALES_KEY) || "[]"); }
    function saveSales(sales) { localStorage.setItem(SALES_KEY, JSON.stringify(sales)); }
    function getCatalog() { return JSON.parse(localStorage.getItem(PRODUCTS_KEY) || "[]"); }
    function saveCatalog(catalog) { localStorage.setItem(PRODUCTS_KEY, JSON.stringify(catalog)); }

    function formatPrice(value) {
      if (currentLang === "es") return new Intl.NumberFormat("es-CL", { style: "currency", currency: "CLP", maximumFractionDigits: 0 }).format(value);
      return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 0 }).format(Math.round(value / 950));
    }

    function render() {
      const cart = getCart();
      const list = document.getElementById("checkout-list");
      const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
      if (!cart.length) list.innerHTML = `<p class="text-slate-500">Tu carrito está vacío 💧</p>`;
      else {
        list.innerHTML = cart.map(item => `
          <div class="flex items-center justify-between border border-sky-100 rounded-xl p-3">
            <div>
              <p class="font-bold text-sky-700">${currentLang === "es" ? item.nameEs : item.nameEn}</p>
              <p class="text-sm text-slate-500">x${item.qty}</p>
            </div>
            <p class="font-black text-cyan-600">${formatPrice(item.price * item.qty)}</p>
          </div>
        `).join("");
      }
      document.getElementById("checkout-total").textContent = formatPrice(total);
      document.getElementById("confirm-pay").disabled = !cart.length;
      document.getElementById("confirm-pay").classList.toggle("opacity-60", !cart.length);
    }

    function confirmPay() {
      const cart = getCart();
      if (!cart.length) return;
      const paymentMethod = document.getElementById("payment-method").value;
      const transferRef = document.getElementById("transfer-ref").value.trim();
      const msg = document.getElementById("pay-msg");
      if (paymentMethod === "transfer" && !transferRef) {
        msg.className = "mt-4 font-semibold text-rose-600";
        msg.textContent = "Debes ingresar el ID de referencia para transferencia.";
        return;
      }

      const catalog = getCatalog();
      const stockError = cart.find(item => {
        const p = catalog.find(prod => prod.id === item.id);
        return !p || (p.stock ?? 0) < item.qty;
      });
      if (stockError) {
        msg.className = "mt-4 font-semibold text-rose-600";
        msg.textContent = "Stock insuficiente. Vuelve a la tienda y actualiza tu carrito.";
        return;
      }

      const sales = getSales();
      cart.forEach(item => {
        const prod = catalog.find(p => p.id === item.id);
        if (prod) prod.stock = Math.max(0, (prod.stock ?? 0) - item.qty);
        for (let i = 0; i < item.qty; i++) {
          sales.push({
            id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
            fecha: new Date().toISOString(),
            producto: { es: item.nameEs, en: item.nameEn },
            size: item.size,
            full: item.full,
            price: item.price,
            paymentMethod,
            transferReference: paymentMethod === "transfer" ? transferRef : ""
          });
        }
      });

      saveCatalog(catalog);
      saveSales(sales);
      saveCart([]);
      msg.className = "mt-4 font-semibold text-emerald-600";
      msg.textContent = "Pago realizado con éxito. Redirigiendo al panel...";
      render();
      setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);
    }

    function clearCart() { saveCart([]); render(); }
    function toggleTransferReference() {
      const isTransfer = document.getElementById("payment-method").value === "transfer";
      const box = document.getElementById("transfer-ref-box");
      const input = document.getElementById("transfer-ref");
      box.classList.toggle("hidden", !isTransfer);
      if (!isTransfer) input.value = "";
    }

    document.getElementById("confirm-pay").addEventListener("click", confirmPay);
    document.getElementById("clear-cart").addEventListener("click", clearCart);
    document.getElementById("payment-method").addEventListener("change", toggleTransferReference);
    toggleTransferReference();
    render();
  </script>
</body>
</html>
